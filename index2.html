<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>トーキョーＮ◎ＶＡ THE AXLERATION リンク RPG "ビフレスト"</title>
  <style>
    :root {
      --cyan: #00f0ff;
      --magenta: #ff00aa;
      --yellow: #ffe700;
      --text: #e0f8ff;
      --muted: #88aaff;
      --cut: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      min-height: 100%;
      color: var(--text);
      font-family: Inter, "Noto Sans JP", system-ui, sans-serif;
      background: #0a001f;
    }

    .noise { position: fixed; inset: 0; pointer-events: none; opacity: .12; z-index: 2;
      background-image: radial-gradient(circle at 30% 20%, rgba(255,255,255,.3) 0 1px, transparent 1px),
                        radial-gradient(circle at 70% 60%, rgba(255,0,170,.25) 0 1px, transparent 1px);
      background-size: 80px 80px, 120px 120px;
      animation: noiseShift 0.4s steps(3) infinite;
    }

    /* ネオン背景エフェクト */
    body::before, body::after {
      content: ""; position: fixed; inset: 0; z-index: 1; pointer-events: none;
    }
    body::before {
      background: radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(255, 0, 170, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 40% 80%, rgba(157, 0, 255, 0.06) 0%, transparent 60%);
      animation: neonPulse 25s ease-in-out infinite alternate;
      opacity: 0.7;
    }
    body::after {
      background: linear-gradient(90deg, transparent 0%, rgba(0,240,255,0.03) 50%, transparent 100%),
                  linear-gradient(180deg, transparent 0%, rgba(255,0,170,0.03) 50%, transparent 100%);
      animation: neonScan 40s linear infinite;
      opacity: 0.4;
    }

    @keyframes neonPulse { 0% { opacity: 0.5; } 100% { opacity: 0.85; } }
    @keyframes neonScan { 0% { transform: translate(-30%, -30%); } 100% { transform: translate(30%, 30%); } }
    @keyframes noiseShift { 0% { transform: translate(0,0); } 100% { transform: translate(2px, -2px); } }

    .wrap { width: min(1380px, calc(100% - 20px)); margin: 0 auto; z-index: 5; }

    h1 { margin: 0 0 12px; font-size: clamp(38px, 8vw, 96px); line-height: .9; letter-spacing: -.08em; text-shadow: 0 0 30px var(--cyan); }

    /* セクターヘッダー */
    .scenario-header {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 20px;
      background: rgba(15,5,45,.92);
      border-bottom: 2px solid var(--cyan);
      cursor: pointer;
    }

    .scenario-head-content { display: flex; align-items: center; gap: 20px; flex: 1; flex-wrap: wrap; }

    .scenario-head h3 { font-size: clamp(22px, 5vw, 32px); margin: 0; }

    .scenario-sub { font-size: clamp(16px, 4vw, 24px); white-space: nowrap; }

    .handouts { display: flex; gap: 8px; flex-wrap: wrap; }

    /* カードグリッド */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      padding: 20px 0;
    }

    /* スマホ対応 */
    @media (max-width: 768px) {
      .cards { grid-template-columns: 1fr; gap: 18px; padding: 16px 0; }
      .scenario-header { padding: 18px 16px; gap: 12px; }
      .scenario-head-content { gap: 12px; }
      .body { padding: 18px; }
      .topline { margin-bottom: 12px; }
    }

    /* カード */
    .card {
      background: linear-gradient(180deg, rgba(15,8,40,.95), rgba(8,4,25,.98));
      border: 2px solid rgba(78,229,255,.3);
      clip-path: var(--cut); overflow: hidden;
      transition: all .35s ease;
    }

    .card:hover {
      border: 5px solid transparent;
      background: 
        linear-gradient(#0f0828, #080419),
        conic-gradient(#00ffff, #00ccff, #ff00ff, #ff0088, #aa00ff, #00ffff);
      background-clip: padding-box, border-box;
      background-origin: padding-box, border-box;
      box-shadow: 
        0 0 30px #00ffff,
        0 0 60px #ff00ff,
        0 0 95px rgba(170, 0, 255, 0.85);
      transform: translateY(-10px) scale(1.015);
    }

    /* スキャンラインなど他のスタイルは省略（変更なし） */
    .art { aspect-ratio: 1 / 1; overflow: hidden; }
    .art img { width: 100%; height: 100%; object-fit: contain; }

    .name { font-size: clamp(21px, 4.5vw, 28px); }
    .reading { font-size: clamp(13.5px, 3.5vw, 15px); }

    footer { padding: 50px 0 70px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>
  <!-- ここから下は元のHTMLと同じ内容を維持 -->
  <div class="noise"></div>

  <div class="wrap">
    <!-- ここにあなたの既存のHTML内容（heroからfooterまで）をすべて貼り付けてください -->
    <!-- （長いので省略していますが、元のファイルの内容をそのまま使ってください） -->
  </div>

  <script>
    /* スクリプト部分もそのまま */
    function toggleSector(id) {
      const group = document.getElementById(id);
      if (group) group.classList.toggle('collapsed');
    }

    function typeText(element) {
      const text = element.getAttribute('data-text');
      element.innerHTML = '';
      let i = 0;
      function type() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(type, 45);
        }
      }
      type();
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.scenario-header').forEach(header => {
        const sub = header.querySelector('.scenario-sub');
        if (sub) {
          sub.style.opacity = '0';
          header.addEventListener('mouseenter', () => {
            sub.style.opacity = '1';
            if (!sub.hasAttribute('data-typed')) {
              typeText(sub);
              sub.setAttribute('data-typed', 'true');
            }
          });
        }
      });
    });
  </script>
</body>
</html>
