<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <title>N◎VA LINK ONLINE - Boot Sequence</title>

  <style>
    :root {
      --cyan: #00f0ff;
      --magenta: #ff00aa;
      --green: #00ff88;
      --yellow: #ffe700;
      --text: #e0f8ff;
      --bg: #05000f;
      --cut-lg: polygon(22px 0, 100% 0, 100% calc(100% - 22px), calc(100% - 22px) 100%, 0 100%, 0 22px);
      --cut-sm: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: Inter, "Noto Sans JP", system-ui, sans-serif;
      background:
        radial-gradient(circle at 50% 45%, rgba(0, 240, 255, .08), transparent 34%),
        radial-gradient(circle at 20% 85%, rgba(255, 0, 170, .10), transparent 42%),
        var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0) 50%, rgba(0,240,255,.035) 50%),
        radial-gradient(circle at 25% 45%, rgba(255,255,255,.14) 0 1px, transparent 1px);
      background-size: 100% 4px, 110px 110px;
      opacity: .32;
      z-index: 20;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(0,240,255,.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,.12) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
      -webkit-mask-image: radial-gradient(circle at center, black, transparent 78%);
      opacity: .28;
      animation: gridScroll 6s linear infinite;
      z-index: 1;
    }

    .boot-page {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .monitor-shell {
      width: min(980px, 100%);
      padding: 18px;
      border: 1px solid rgba(0, 240, 255, .28);
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(0,0,0,.18)),
        rgba(1, 4, 18, .92);
      clip-path: var(--cut-lg);
      box-shadow:
        0 0 60px rgba(0,0,0,.85),
        0 0 34px rgba(0,240,255,.14),
        inset 0 0 34px rgba(0,240,255,.05);
    }

    .monitor {
      position: relative;
      min-height: 560px;
      overflow: hidden;
      border: 1px solid rgba(0, 240, 255, .34);
      background:
        radial-gradient(circle at center, rgba(0, 240, 255, .035), transparent 45%),
        #01030d;
      clip-path: var(--cut-lg);
      cursor: pointer;
    }

    .monitor::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(0, 240, 255, .12);
      clip-path: var(--cut-sm);
      pointer-events: none;
      z-index: 8;
    }

    .monitor::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 7;
      background:
        linear-gradient(90deg, transparent, rgba(0,240,255,.08), transparent),
        linear-gradient(rgba(255,255,255,0) 50%, rgba(0,240,255,.04) 50%);
      background-size: 100% 100%, 100% 5px;
      opacity: .7;
      mix-blend-mode: screen;
    }

    .power-off {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      text-align: center;
      background:
        radial-gradient(circle at center, rgba(0,240,255,.05), rgba(0,0,0,.92) 52%);
      transition: opacity .45s ease, visibility .45s ease;
    }

    .started .power-off {
      opacity: 0;
      visibility: hidden;
    }

    .power-button {
      width: 132px;
      height: 132px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 2px solid rgba(0,240,255,.65);
      color: var(--cyan);
      font-size: 54px;
      text-shadow: 0 0 18px var(--cyan);
      box-shadow:
        0 0 18px rgba(0,240,255,.38),
        inset 0 0 24px rgba(0,240,255,.08);
      animation: powerPulse 2s ease-in-out infinite;
    }

    .start-text {
      font-family: "Share Tech Mono", monospace;
      letter-spacing: .22em;
      color: rgba(224,248,255,.72);
    }

    .start-text strong {
      display: block;
      margin-bottom: 10px;
      color: #fff;
      font-family: "Orbitron", sans-serif;
      font-size: clamp(28px, 5vw, 52px);
      line-height: .9;
      letter-spacing: -.06em;
      text-shadow:
        0 0 18px rgba(0,240,255,.75),
        0 0 44px rgba(0,240,255,.24);
    }

    .screen {
      position: absolute;
      inset: 0;
      padding: 32px;
      opacity: 0;
      transform: scale(.985);
      transition: opacity .45s ease .18s, transform .45s ease .18s;
      z-index: 4;
    }

    .started .screen {
      opacity: 1;
      transform: scale(1);
    }

    .system-title {
      font-family: "Share Tech Mono", monospace;
      color: rgba(224,248,255,.68);
      letter-spacing: .22em;
      font-size: 12px;
    }

    .system-title h1 {
      margin: 10px 0 10px;
      color: #fff;
      font-family: "Orbitron", sans-serif;
      font-size: clamp(44px, 8vw, 92px);
      line-height: .82;
      letter-spacing: -.09em;
      text-shadow:
        0 0 18px rgba(0,240,255,.82),
        0 0 54px rgba(0,240,255,.32);
    }

    .status-line {
      display: inline-block;
      margin-top: 6px;
      padding: 7px 12px;
      border: 1px solid rgba(0,255,136,.42);
      color: var(--green);
      background: rgba(0,255,136,.055);
      font-family: "Share Tech Mono", monospace;
      font-size: 12px;
      letter-spacing: .14em;
      clip-path: var(--cut-sm);
      text-shadow: 0 0 10px rgba(0,255,136,.72);
    }

    .console {
      position: absolute;
      left: 32px;
      right: 32px;
      bottom: 32px;
      min-height: 220px;
      padding: 18px 20px;
      border: 1px solid rgba(0,240,255,.3);
      background: rgba(2, 5, 22, .78);
      clip-path: var(--cut-sm);
      font-family: "Share Tech Mono", monospace;
      font-size: 14px;
      line-height: 1.8;
      color: rgba(224,248,255,.84);
      box-shadow: inset 0 0 24px rgba(0,240,255,.045);
    }

    .console-line.green {
      color: var(--green);
      text-shadow: 0 0 10px rgba(0,255,136,.66);
    }

    .console-line.magenta {
      color: var(--magenta);
      text-shadow: 0 0 10px rgba(255,0,170,.55);
    }

    .console-line.yellow {
      color: var(--yellow);
    }

    .progress-wrap {
      position: absolute;
      left: 32px;
      right: 32px;
      bottom: 18px;
      height: 4px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      z-index: 12;
      opacity: 0;
    }

    .started .progress-wrap {
      opacity: 1;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--magenta), var(--cyan), var(--green));
      box-shadow: 0 0 18px rgba(0,240,255,.7);
    }

    .flash {
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      background: #eaffff;
      opacity: 0;
    }

    .flash.active {
      animation: flashOut .72s ease forwards;
    }

    .city-ghost {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(rgba(1,3,13,.24), rgba(1,3,13,.72)),
        url("assets/citymap.png");
      background-size: cover;
      background-position: center;
      opacity: 0;
      filter: contrast(1.05) brightness(.92);
      transform: scale(1.03);
      transition: opacity 1.2s ease, transform 2.8s ease;
    }

    .started .city-ghost {
      opacity: .32;
      transform: scale(1);
    }

    .skip-link {
      position: fixed;
      right: 18px;
      bottom: 16px;
      z-index: 30;
      color: rgba(224,248,255,.45);
      font-family: "Share Tech Mono", monospace;
      font-size: 12px;
      text-decoration: none;
      letter-spacing: .14em;
    }

    .skip-link:hover {
      color: var(--cyan);
    }

    @keyframes powerPulse {
      0%, 100% {
        transform: scale(1);
        opacity: .72;
      }

      50% {
        transform: scale(1.06);
        opacity: 1;
      }
    }

    @keyframes gridScroll {
      from { background-position: 0 0; }
      to { background-position: 0 80px; }
    }

    @keyframes flashOut {
      0% { opacity: 0; }
      14% { opacity: .94; }
      100% { opacity: 0; }
    }

    @media screen and (max-width: 768px) {
      body {
        overflow: auto;
      }

      .boot-page {
        min-height: 100svh;
        padding: 10px;
      }

      .monitor-shell {
        padding: 10px;
      }

      .monitor {
        min-height: 620px;
      }

      .screen {
        padding: 22px;
      }

      .console {
        left: 20px;
        right: 20px;
        bottom: 34px;
        min-height: 260px;
        font-size: 12px;
      }

      .progress-wrap {
        left: 20px;
        right: 20px;
      }

      .power-button {
        width: 108px;
        height: 108px;
        font-size: 44px;
      }
    }
  </style>
</head>

<body>
  <main class="boot-page">
    <section class="monitor-shell">
      <section class="monitor" id="monitor" aria-label="Boot Monitor">
        <div class="city-ghost"></div>

        <div class="power-off" id="power-off">
          <div>
            <div class="power-button">⏻</div>
            <div class="start-text">
              <strong>N◎VA LINK<br>ONLINE</strong>
              CLICK TO POWER ON
            </div>
          </div>
        </div>

        <div class="screen">
          <div class="system-title">
            REMOTE TERMINAL / SECTOR ARCHIVE
            <h1>BOOT<br>SEQUENCE</h1>
            <div class="status-line" id="status-line">SYSTEM STARTING...</div>
          </div>

          <div class="console" id="console">
            <div class="console-line green">&gt; POWER INPUT DETECTED</div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress" id="progress"></div>
        </div>
      </section>
    </section>
  </main>

  <div class="flash" id="flash"></div>

  <a class="skip-link" href="index.html">SKIP / ENTER ARCHIVE</a>

  <script>
    const monitor = document.getElementById('monitor');
    const consoleBox = document.getElementById('console');
    const progress = document.getElementById('progress');
    const statusLine = document.getElementById('status-line');
    const flash = document.getElementById('flash');

    const bootLines = [
      { text: '> POWER INPUT DETECTED', className: 'green', progress: 8 },
      { text: '> DISPLAY UNIT ONLINE', className: '', progress: 16 },
      { text: '> LOADING N◎VA LINK PROTOCOL...', className: '', progress: 27 },
      { text: '> CITYMAP SIGNAL FOUND : tokyo/N◎VA/citymap', className: 'yellow', progress: 39 },
      { text: '> SCANNING SECTOR BEACONS...', className: '', progress: 52 },
      { text: '> POLICE / COMPANY / STREET / ASTRAL / TECH / MEDIA / SOCIETY', className: 'magenta', progress: 66 },
      { text: '> CAST DATABASE RESTORING...', className: '', progress: 78 },
      { text: '> ACCESS GRANTED', className: 'green', progress: 91 },
      { text: '> ENTERING SECTOR ARCHIVE', className: 'green', progress: 100 }
    ];

    let started = false;

    monitor.addEventListener('click', () => {
      if (started) return;
      started = true;
      monitor.classList.add('started');
      runBootSequence();
    });

    function runBootSequence() {
      consoleBox.innerHTML = '';

      bootLines.forEach((line, index) => {
        setTimeout(() => {
          addConsoleLine(line.text, line.className);
          progress.style.width = `${line.progress}%`;

          if (line.progress >= 100) {
            statusLine.textContent = 'ACCESS GRANTED';
            statusLine.style.color = 'var(--green)';
            setTimeout(enterArchive, 850);
          }
        }, index * 420);
      });
    }

    function addConsoleLine(text, className) {
      const row = document.createElement('div');
      row.className = `console-line ${className || ''}`;
      row.textContent = text;
      consoleBox.appendChild(row);
      consoleBox.scrollTop = consoleBox.scrollHeight;
    }

    function enterArchive() {
      flash.classList.add('active');

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 520);
    }
  </script>
</body>
</html>
